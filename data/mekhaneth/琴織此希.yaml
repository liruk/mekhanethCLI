profile:
  appearance: ヘーゼルのポニーテール。胸は中程度。日焼けした肌。
  personality: "- 強気。\n- ただしそれは虚仮威しで、キョウヤの前では本来の弱気な面が出る。\n- 曲がりなりにも淫魔の肉体なので、性欲は強い"
  ability:
    - リボルバーによる魔弾射撃
    - 《呪言》への抵抗: 淫魔化の過程で獲得
background: "- 淫魔に肉体改造され、男性から女性に性転換した。\n- 転移者。元の世界でオラクルデーモンに遭遇し、その巣（涜船エグジラ）で改造を受けた。\n- オブリビオン・インダストリーズで戦わされていたが、コーポ・アレスとの戦争時に亡命。\n- 六年かけて自我を取り戻した。\n- ピザが好き。\n- あやめに好意を持っている。\n- キョウヤやシラカのことも、幼馴染として大切に思っている。"
relations:
