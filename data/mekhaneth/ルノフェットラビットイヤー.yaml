background: "- らんの実験体時代の後輩。\n- カレー屋でバイトしている。\n- 本職軍人。コーポ・アレスの密偵。\n- 黑入鹿いおどともに、異世界「カイムスフィア」に転移し、冒険している。"
relations:
  - target: 小凪葉らん
    content: できれば昔みたいに愛してほしいけど、先輩が幸せならそれでいい
  - target: スキップ・センサード博士
    content: チームの怖い人一号。この人の言うことだけは確実に従うようにしよう
  - target: ピュリファイア
    content: ボクは「瘴気をまとっている」らしく、良い印象は持たれていなさそう。相性が悪い。
  - target: 小凪葉まゆ
    content: 親友。お互いの知らないらんのことで一生盛り上がれる
  - target: ユアンスウ肆式
    content: 実は成人しているのでバーに遊びにいったことがある。上品すぎる。
  - target: 九十九堂冷泉分胤
    content: 欲が枯れている。誘惑が通じない。「そりゃ、シノビの感情はもっとデカくないと分からないからな」だってさ
  - target: カワイイスパイス
    content: 経緯や目標はともかく、割と真剣にママをやっていると思う。それはそうと、ボクはおもちゃじゃないんだけど……
  - target: 黑入鹿イオド
    content: 羨ましいなあ。愛されるって幸せなんだよ？
  - target: マヤーレI
    content: 愛することを知らない無垢な子供。開発してあげてもいいけど、先輩に怒られそう
  - target: ツーズー
    content: チームの怖い人二号。悪い人ではないが、敵を仕留める際の容赦なさを見て漏らしそうになった
  - target: ララモイ
    content: チームの怖い人三号。彼女がニヤリと笑った時、相手には不幸が降り注ぐ。
  - target: ツィールハフィー
    content: 可愛かった。とても相性がいい。また遊びたい。
  - target: 桜之宮なこ
    content: チームの怖い人四号。皆気づいてないけど、顔を見ただけで秘密が全部バレるのは怖い。秘密まみれなので
  - target: 紅恭也
    content: 「お前も男の娘にならないか？ポテンシャルあるよ」「ならない」「そっかあ」
  - target: 砂原海白花
    content: 「紅くんが可愛い格好するの見たくない？」「見たくなくはないかも……？」
  - target: 月紀寺あやめ
    content: 本人が「壁になって推しカプを見たい」タイプなので相性が良くない。とてもかわいいとは思う
  - target: ダスト・ソードランページ
    content: いつもらん先輩の影を見ている人。先輩は大抵のことは気にしないよ
  - target: ゲイリー・スー
    content: 名目上での同僚。あれで経験豊富なので、多少からかっても動じない
  - target: ルノフェット
    content: ボクただ一人を受け入れてくれる人が欲しい。
