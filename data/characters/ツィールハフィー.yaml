name: ツィール・ハフィー
aliases:
  - Ziel Hafi
profile:
  appearance: 青黒い肌。ビビッドレッドのチューブトップ。
  personality: '- 酒: 75。男を酔い潰して遊んでいた。'
background: "- シャドウリング (影人)。\n- 元の世界では貴人専門のアサシン。\n- ビッチ属性あり。"
relations:
  - target: 小凪葉らん
    content: 容姿も力もスゴいけど、人間関係はまだまだウブね
  - target: スキップ・センサード博士
    content: 出会って早々に採血させられそうになった。非常識の賢者。未来が見えてる
  - target: ピュリファイア
    content: 対女性専門の房中術を修めていらっしゃるお方。反撃できなかった
  - target: 小凪葉まゆ
    content: らんとの関係で協力している。背中を押したい
  - target: ユアンスウ肆式
    content: どうにもやりづらい。できるのにあえて手を出していない分野が多いっぽい
  - target: 九十九堂冷泉分胤
    content: その腕暗殺用でしょ？　えっ？　正面から叩きに行くの……？
  - target: カワイイスパイス
    content: ひと目でシャドウリングだと理解された。常識内の賢者。
  - target: 黑入鹿イオド
    content: 無垢でウブ。カワイイスパイスさんが目をつけているので、特に干渉はしない
  - target: マヤーレI
    content: 無垢でウブ2号。流石にストライクゾーンからは外れている。
  - target: ツーズー
    content: 熟練の女戦士。高潔な信念の相性がうちとは悪いけど、敬意は持ってる。
  - target: ララモイ
    content: 「芋って寒冷地の成金どもが食べるやつでしょ？」と心で思ったらしこたま食わされた。美味い。
  - target: ツィール
    content: あっちじゃ殺してばっかりだったけれど、こっちじゃキューピットになるのもいいかもね
  - target: 桜之宮なこ
    content: 座るときに「よっこいしょ」とか言う。実年齢知らされてないけど35くらいじゃない？
  - target: 紅恭也
    content: 「君新入り？　かわいいね」「がるるる！」「おっと、先約が居たか。ごめんね」
  - target: 砂原海白花
    content: もっと危機感を持とうよ。告ろ？　じゃないと本当に食べるよ？
  - target: 月紀寺あやめ
    content: 天性のプロポーション。ダンス覚えたら相当映えるよ。やらない？「やです」
  - target: ダスト・ソードランページ
    content: 流石に大人な人。上品なお酒を飲む。
  - target: ゲイリー・スー
    content: お客さん。お金から何から搾り取った。可愛かった。
  - target: ルノフェット
    content: 完全にリードされたのは人生で最初に覚えさせられた時以来。また抱かれたい
