- 魔導具研究で破産し、三年前にピリに買い取られた。
- 資源さえあれば仕事はきっちりこなす現場担当。
relations:
- target: ピリニャス
  content: 雇い主であり相棒。文句を言いつつ信頼している。
- target: フォボス
  content: 送り届けるべき子として励ます。
voice_design:
