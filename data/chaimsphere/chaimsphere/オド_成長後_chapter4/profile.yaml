name: オド（成長後）
reading: オド
aliases:
  - オド
  - オド・クロイルカ
profile:
  age: "10代半ば"
  appearance: 小柄さは残るが、所作や表情に落ち着きが増した少年。柔らかさの中に責任者としての芯がある。
  personality: 面倒見がよく判断が速い。優しさを失わずに周囲を取りまとめ、必要な場面でははっきり制止できる。
  ability:
    - 高密度の魔力運用
    - 回復・補助・戦闘を横断する高い実戦能力
    - 書類処理や判断業務をこなす統率力
  speech_style: 基本は柔らかいが、以前より言葉運びが滑らかで安定している。中音寄りに少し落ち着きが増し、指示や制止は明瞭でテンポが良い。
background:
  - 魔王討伐後、騎士として振る舞い、周囲から頼られる立場になっている。
  - 家族や仲間を抱えつつ、実務や判断もこなす段階まで成長している。
relations:
  - target: レシュ
    content: 深い信頼関係にあり、気遣いながら支え合っている。
  - target: クレオネス
    content: 仲間として対等に接しつつ、礼儀や配慮も忘れない。
voice_design:
  group: オド/voiceSample/chapter4
  base_style_prompt: >
    成長して落ち着きが増した10代半ばの少年。やや中音寄りの澄んだ声で、
    柔らかさを保ちながらも判断が早く、周囲を安心させる芯のある話し方。
    感情的に叫ぶのではなく、明瞭さと実務的な落ち着きを両立する。
  style_variants:
    - 仲間をなだめる場面で、少し早口だが頼もしさのある制止。
    - 書類仕事を終えたあとのように、肩の力が抜けた穏やかな明るさ。
    - 騎士として応対する場面で、礼儀正しく滑らかな口調。
  sample_text: まだだから！ まだ誰も確定って言ってないから！ まず落ち着いて！
source:
  chapters:
    - chapter4
  evidence:
    - chapter4/01.md:14-19
    - chapter4/03.md:221-228
    - chapter4/38.md:137-149
misc:
  stage: chapter4
  notes: 幼さは残しつつ、判断力と安定感が増した後期の声として設計した。
