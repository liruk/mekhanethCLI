name: オド（成長前）
reading: オド
aliases:
  - オド
  - オド・クロイルカ
profile:
  age: "10代前半"
  appearance: 小柄で可憐な少年。女装が似合う中性的な見た目で、まだ幼さが強く残る。
  personality: 礼儀正しく慎重。優しく人当たりがよい一方、戸惑うと少し詰まりがちで、控えめな初々しさがある。
  ability:
    - 高い魔力と植物・回復寄りの魔法適性
    - 対人折衝と気配り
  speech_style: 丁寧で柔らかい。少し高めの少年声で、語尾に遠慮がにじむ。緊張時は息が浅くなり、言葉の出だしがためらいがち。
background:
  - 異世界から召喚された直後で、世界にも周囲にもまだ不慣れ。
  - かわいらしい外見と穏やかな受け答えで、周囲から保護欲や好意を向けられやすい。
relations:
  - target: ルノフェン
    content: 同じく召喚された相棒。気遣いながら寄り添う。
  - target: テヴァネツァク
    content: 召喚直後に最初に対話した相手で、礼儀正しく応対している。
voice_design:
  group: オド/voiceSample/chapter1
  base_style_prompt: >
    小柄で可憐な10代前半の少年。中高めで軽い声質、息の当たりは柔らかく、
    礼儀正しく控えめに話す。おどおどしすぎず、素直で優しい印象を保つ。
  style_variants:
    - 目覚めた直後のように少し緊張しており、語り出しにためらいがある。
    - 安心した場面で、やや明るく素直に感情が乗る。
    - 小声で気遣うように、近い距離感で柔らかく話す。
  sample_text: あの、ここはどちらでしょう？ それと、貴女の名前を伺っても？
source:
